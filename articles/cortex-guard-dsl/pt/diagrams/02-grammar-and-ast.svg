<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="#fafafa"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111">Gramatica e arvore de expressao</text>

  <!-- Grammar box -->
  <rect x="30" y="55" width="380" height="170" rx="10" fill="#1f2937"/>
  <text x="220" y="80" text-anchor="middle" font-size="13" fill="#9ca3af">Gramatica (EBNF)</text>
  <text x="50" y="106" font-size="12" fill="#86efac" font-family="monospace">expression  ::= or_expr</text>
  <text x="50" y="126" font-size="12" fill="#86efac" font-family="monospace">or_expr     ::= and_expr ("OR" and_expr)*</text>
  <text x="50" y="146" font-size="12" fill="#86efac" font-family="monospace">and_expr    ::= not_expr ("AND" not_expr)*</text>
  <text x="50" y="166" font-size="12" fill="#86efac" font-family="monospace">not_expr    ::= "NOT" not_expr</text>
  <text x="50" y="182" font-size="12" fill="#86efac" font-family="monospace">           | "(" expression ")"</text>
  <text x="50" y="198" font-size="12" fill="#86efac" font-family="monospace">           | atom</text>
  <text x="50" y="218" font-size="12" fill="#86efac" font-family="monospace">atom        ::= identifier ">=" int | identifier</text>

  <!-- Real expression box -->
  <rect x="30" y="250" width="380" height="42" rx="8" fill="#374151"/>
  <text x="220" y="267" text-anchor="middle" font-size="11" fill="#9ca3af">Expressao real do TransitionMap (ACT -> HANDOFF)</text>
  <text x="220" y="284" text-anchor="middle" font-size="13" fill="#fbbf24" font-family="monospace">"tool_result.requests_handoff OR consecutive_failures >= 2"</text>

  <!-- Arrow -->
  <line x1="415" y1="155" x2="460" y2="155" stroke="#888" stroke-width="2" marker-end="url(#ah2)"/>
  <text x="437" y="143" text-anchor="middle" font-size="10" fill="#888">parse</text>

  <!-- AST tree -->
  <text x="680" y="80" text-anchor="middle" font-size="13" fill="#888">AST resultante</text>

  <!-- Or node -->
  <rect x="630" y="90" width="100" height="36" rx="8" fill="#f97316"/>
  <text x="680" y="113" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">Or</text>

  <!-- Left: Signal -->
  <rect x="475" y="170" width="160" height="50" rx="8" fill="#3b82f6"/>
  <text x="555" y="192" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Signal</text>
  <text x="555" y="210" text-anchor="middle" font-size="10" fill="#bfdbfe" font-family="monospace">tool_result.requests_handoff</text>

  <!-- Right: Threshold -->
  <rect x="660" y="170" width="180" height="50" rx="8" fill="#16a34a"/>
  <text x="750" y="192" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Threshold</text>
  <text x="750" y="210" text-anchor="middle" font-size="10" fill="#bbf7d0" font-family="monospace">consecutive_failures >= 2</text>

  <line x1="660" y1="126" x2="590" y2="170" stroke="#f97316" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="700" y1="126" x2="760" y2="170" stroke="#f97316" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- Evaluation labels -->
  <rect x="475" y="245" width="160" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="555" y="264" text-anchor="middle" font-size="11" fill="#1d4ed8">RuntimeSignals.toolResultRequestsHandoff</text>

  <rect x="660" y="245" width="180" height="30" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="750" y="264" text-anchor="middle" font-size="11" fill="#15803d">ExecutionMetrics.consecutiveFailures</text>

  <line x1="555" y1="220" x2="555" y2="245" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="750" y1="220" x2="750" y2="245" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="450" y="310" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Avalia em short-circuit: para no primeiro verdadeiro (OR) ou falso (AND)</text>

  <!-- Precedence note -->
  <rect x="30" y="315" width="380" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="220" y="336" text-anchor="middle" font-size="12" fill="#374151" font-weight="700">Precedencia de operadores</text>
  <text x="220" y="356" text-anchor="middle" font-size="12" fill="#6b7280">NOT  &gt;  AND  &gt;  OR     (parenteses sobrepoe)</text>
</svg>
