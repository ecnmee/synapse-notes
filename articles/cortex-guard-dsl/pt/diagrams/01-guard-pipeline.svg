<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
  <rect width="900" height="340" fill="#fafafa"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111">Pipeline de guardas do CortexOS</text>

  <!-- Phase labels -->
  <text x="160" y="72" text-anchor="middle" font-size="11" fill="#888">boot-time</text>
  <text x="490" y="72" text-anchor="middle" font-size="11" fill="#888">boot-time</text>
  <text x="740" y="72" text-anchor="middle" font-size="11" fill="#888">runtime</text>

  <!-- Box 1: Expression -->
  <rect x="30" y="90" width="260" height="80" rx="10" fill="#eef6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Expressao de guarda</text>
  <text x="160" y="145" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="monospace">"tool_result.requests_handoff</text>
  <text x="160" y="162" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="monospace"> OR consecutive_failures >= 2"</text>

  <line x1="290" y1="130" x2="350" y2="130" stroke="#888" stroke-width="2" marker-end="url(#ah)"/>
  <text x="320" y="120" text-anchor="middle" font-size="10" fill="#888">GuardParser</text>
  <text x="320" y="148" text-anchor="middle" font-size="10" fill="#888">.compile()</text>

  <!-- Box 2: CompiledGuard AST -->
  <rect x="350" y="90" width="280" height="130" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="490" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">CompiledGuard (AST)</text>
  <text x="490" y="140" text-anchor="middle" font-size="12" fill="#166534">Or</text>
  <text x="430" y="170" text-anchor="middle" font-size="11" fill="#166534">Signal</text>
  <text x="430" y="186" text-anchor="middle" font-size="10" fill="#15803d" font-family="monospace">requests_handoff</text>
  <text x="555" y="170" text-anchor="middle" font-size="11" fill="#166534">Threshold</text>
  <text x="555" y="186" text-anchor="middle" font-size="10" fill="#15803d" font-family="monospace">failures >= 2</text>
  <line x1="490" y1="148" x2="440" y2="160" stroke="#16a34a" stroke-width="1"/>
  <line x1="490" y1="148" x2="540" y2="160" stroke="#16a34a" stroke-width="1"/>

  <line x1="630" y1="155" x2="690" y2="155" stroke="#888" stroke-width="2" marker-end="url(#ah)"/>
  <text x="660" y="143" text-anchor="middle" font-size="10" fill="#888">GuardEvaluator</text>
  <text x="660" y="172" text-anchor="middle" font-size="10" fill="#888">.evaluate()</text>

  <!-- Box 3: Runtime evaluation -->
  <rect x="690" y="90" width="180" height="130" rx="10" fill="#fdf4ff" stroke="#a21caf" stroke-width="1.5"/>
  <text x="780" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#701a75">Avaliacao</text>
  <text x="780" y="142" text-anchor="middle" font-size="12" fill="#86198f">GuardRegistry</text>
  <text x="780" y="162" text-anchor="middle" font-size="11" fill="#9d174d">+ RuntimeSignals</text>
  <text x="780" y="180" text-anchor="middle" font-size="11" fill="#9d174d">+ ExecutionMetrics</text>
  <rect x="730" y="196" width="100" height="18" rx="6" fill="#a21caf"/>
  <text x="780" y="209" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">true / false</text>

  <!-- Bottom note -->
  <rect x="30" y="250" width="840" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="450" y="272" text-anchor="middle" font-size="13" fill="#92400e" font-weight="700">Separacao de responsabilidades</text>
  <text x="450" y="293" text-anchor="middle" font-size="12" fill="#92400e">Expressao invalida explode em boot-time (arranque). Runtime nunca re-parseia texto - opera apenas sobre ASTs.</text>
</svg>
